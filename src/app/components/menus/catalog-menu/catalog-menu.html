
  <div class="catalog-menu-wrapper" [class.open-menu]="uiService.isMenuOpen()">
    <nav class="catalog-menu">
      <ul>
        @for (category of categories(); track category.slug) {
          <li>
            <a [routerLink]="['/catalog',category.slug]" (click)="uiService.closeMenu()">{{category.name}}</a>
          </li>
        }
      </ul>
    </nav>
  </div>
